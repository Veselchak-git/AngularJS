<app-profile-filters

></app-profile-filters>
<div class="profile-card__wrapper">
  @for (profile of profiles(); track profile.id)
  {
    <app-profile-card
      [profile]="profile"
      [isSubscribed]="isSubscribed(profile.id)"
      [isCurrentUser]="profile.id === (profileService.me()?.id)"
      (subscriptionChanged)="onSubscriptionChanged($event)">
    </app-profile-card>
  }
</div>
